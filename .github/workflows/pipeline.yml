name: CI/CD INPT Cloud-DevOps

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # Étape A : Analyse SonarCloud (Questions A.5, A.8, A.9)
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Correction de l'URL et des identifiants d'organisation
        run: >
          mvn -B verify sonar:sonar 
          -Dsonar.projectKey=younesbslh121_lab-java-pipeline 
          -Dsonar.organization=younesbslh121 
          -Dsonar.host.url=https://sonarcloud.io 
          -Dsonar.qualitygate.wait=true

  # Étape B : Création image Docker (Questions B.1, B.2, B.6)
  docker-build:
    name: Docker Build and Push
    needs: sonarcloud # Le build Docker attend le succès de SonarCloud (Question A.9)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' # Filtre "only" pour la branche master (Question B.6)
    
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest
