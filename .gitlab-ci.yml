image: maven:3.8.5-openjdk-17

stages:
  - build
  - test
  - deploy

before_script:
  - echo "Initialisation du stage $CI_JOB_STAGE"
  - export PROJECT_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)

after_script:
  - echo "Nettoyage du stage $CI_JOB_STAGE terminé"

job_build:
  stage: build
  script:
    - mvn clean compile

job_test:
  stage: test
  script:
    - mvn test

  allow_failure: true 

job_deploy:
  stage: deploy    # Simulation de déploiement (copie locale ou vers serveur)
  script:
    - echo "younes:Génération du WAR et déploiement..."
    - mvn package -DskipTests
    - echo "Le fichier WAR est prêt dans target/"

    - mkdir -p /tmp/web_server/
    - cp target/*.war /tmp/web_server/
  only:
    - main
    - master