stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  # On autorise la suite si les tests passent
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement vers AWS..."
    - mvn package -DskipTests
    
    # 1. On répare le format de la clé pour OpenSSH moderne
    - cp "$AWS_PRIVATE_KEY" ./temp_key.pem
    - chmod 600 ./temp_key.pem
    
    # 2. On tente le transfert avec l'utilisateur ubuntu
    - echo "Tentative de transfert..."
    - scp -o StrictHostKeyChecking=no -i ./temp_key.pem target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 3. Déplacement final sur le serveur
    - ssh -o StrictHostKeyChecking=no -i ./temp_key.pem ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "Application déployée !"
  only:
    - master
    - main