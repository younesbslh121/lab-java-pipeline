stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  # On autorise la suite si les tests passent
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
script:
    - echo "Conversion de la clé vers un format moderne..."
    - mvn package -DskipTests
    
    # 1. On force la conversion de la clé RSA vers le format PKCS8 (compatible OpenSSL 3)
    # On utilise 'cat' pour être sûr de lire la variable File correctement
    - openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in "$AWS_PRIVATE_KEY" -out ./modern_key.pem
    - chmod 600 ./modern_key.pem
    
    - echo "Tentative de transfert vers $AWS_IP..."
    # 2. On utilise la clé convertie
    - scp -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./        modern_key.pem target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 3. Déploiement
    - ssh -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./      modern_key.pem ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "Déploiement réussi !"
only:
    - master
    - main