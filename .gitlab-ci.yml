stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement final vers AWS Ubuntu ($AWS_IP)..."
    - mvn package -DskipTests
    
    # 1. Préparation du dossier SSH et nettoyage de la clé
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # On supprime les retours à la ligne Windows éventuels qui corrompent la clé
    - echo "$AWS_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa_aws
    - chmod 600 ~/.ssh/id_rsa_aws
    
    - echo "Tentative de transfert du JAR..."
    # 2. Transfert avec options de compatibilité pour OpenSSL 3 / RSA
    - scp -o StrictHostKeyChecking=no -o BatchMode=yes -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ~/.ssh/id_rsa_aws target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 3. Déploiement dans le dossier Tomcat 9
    - ssh -o StrictHostKeyChecking=no -o BatchMode=yes -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ~/.ssh/id_rsa_aws ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    
    - echo "Félicitations Younes ! Ton application est déployée."
  only:
    - master
    - main