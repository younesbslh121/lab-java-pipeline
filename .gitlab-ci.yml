stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  # On autorise la suite si les tests passent
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Préparation du package final..."
    - mvn package -DskipTests
    - echo "Déploiement vers l'instance Ubuntu ($AWS_IP)..."
    - chmod 400 $AWS_PRIVATE_KEY
    - scp -o StrictHostKeyChecking=no -i $AWS_PRIVATE_KEY target/*.war ubuntu@$AWS_IP:/tmp/
    - ssh -o StrictHostKeyChecking=no -i $AWS_PRIVATE_KEY ubuntu@$AWS_IP "sudo mv /tmp/*.war /var/lib/tomcat9/webapps/"
    - echo "Déploiement terminé avec succès sur AWS !"
  only:
    - master
    - main