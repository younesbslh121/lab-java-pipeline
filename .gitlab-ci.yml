stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  script:
    - mvn clean compile

job_test:
  stage: test
  script:
    - mvn test
  allow_failure: true

job_deploy:
  stage: deploy
  script:
    - echo "Generation du WAR..."
    - mvn package -DskipTests
    - mkdir -p ~/deploy_inpt_java/
    - cp target/*.war ~/deploy_inpt_java/
    - echo "Termine !"
  only:
    - main
    - master