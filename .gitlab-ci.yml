stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement vers AWS Ubuntu ($AWS_IP)..."
    - mvn package -DskipTests
    
    # 1. Création manuelle du fichier de clé à partir de la variable
    - echo "$AWS_PRIVATE_KEY" > ./raw_key.pem
    - chmod 600 ./raw_key.pem
    
    # 2. Conversion vers le format PKCS8 pour compatibilité avec ton Linux moderne
    - openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in ./raw_key.pem -out ./modern_key.pem
    - chmod 600 ./modern_key.pem
    
    - echo "Tentative de transfert du JAR..."
    # 3. Transfert vers le dossier /tmp/ du serveur AWS
    - scp -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 4. Installation dans le dossier Tomcat 9 d'Ubuntu
    - ssh -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "Déploiement réussi ! Ton application est en ligne."
  only:
    - master
    - main