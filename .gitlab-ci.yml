stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - echo "Phase de compilation du projet Java..."
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - echo "Exécution des tests unitaires..."
    - mvn test
  dependencies:
    - job_build

job_deploy_simule:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "DÉMARRAGE DE LA SIMULATION DE DÉPLOIEMENT VERS AWS..."
    - mvn package -DskipTests
    - echo "Connexion SSH à l'instance 107.20.23.113 en cours..."
    - sleep 3
    - mkdir -p ./env_production_aws/webapps/
    - echo "Transfert du fichier .jar vers le serveur de production..."
    - cp target/*.jar ./env_production_aws/webapps/
    - echo "Vérification de l'intégrité du déploiement..."
    - ls -lh ./env_production_aws/webapps/
    - echo "L'application est déployée avec succès sur l'instance AWS."
    - echo "URL d'accès prévue : http://107.20.23.113:8080/demo"
    - echo "ÉTAT DU PIPELINE : SUCCÈS TOTAL"
  only:
    - master
    - main