stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement forcé vers AWS..."
    - mvn package -DskipTests
    
    # 1. On écrit la clé manuellement dans un fichier pour éviter les erreurs de GitLab File
    # On utilise des guillemets simples pour éviter que le Shell n'interprète les caractères spéciaux
    - echo "$AWS_PRIVATE_KEY" > ./raw_key.pem
    - chmod 600 ./raw_key.pem
    
    # 2. Conversion vers PKCS8 (format moderne)
    - openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in ./raw_key.pem -out ./modern_key.pem
    - chmod 600 ./modern_key.pem
    
    - echo "Tentative de transfert vers $AWS_IP..."
    # 3. Transfert avec options de compatibilité
    - scp -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 4. Installation sur Tomcat
    - ssh -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "C'est gagné ! Déploiement terminé."
  only:
    - master
    - main