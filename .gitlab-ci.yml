stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Préparation du package et conversion de la clé..."
    - mvn package -DskipTests
    
    # 1. Conversion de la clé RSA (vieux format) vers PKCS8 (format moderne supporté par ton Linux)
    # On utilise "cat" pour extraire le contenu si GitLab l'envoie mal en tant que chemin de fichier
    - openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in "$AWS_PRIVATE_KEY" -out ./modern_key.pem
    - chmod 600 ./modern_key.pem
    
    - echo "Tentative de transfert vers l'IP $AWS_IP..."
    # 2. Transfert du JAR vers le dossier temporaire d'AWS avec options de compatibilité RSA
    - scp -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 3. Déplacement final vers le dossier Tomcat 9 sur le serveur Ubuntu
    - ssh -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa -i ./modern_key.pem ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "Déploiement réussi avec succès sur AWS !"
  only:
    - master
    - main