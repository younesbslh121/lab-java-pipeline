stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement par Agent SSH..."
    - mvn package -DskipTests
    
    # 1. On démarre l'agent SSH et on lui donne la clé proprement
    - eval $(ssh-agent -s)
    # On utilise "ssh-add" en lui envoyant le contenu de la variable directement
    - echo "$AWS_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    
    - echo "Tentative de transfert vers $AWS_IP..."
    # 2. On fait le transfert (plus besoin de l'option -i car la clé est dans l'agent)
    - scp -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # 3. Installation finale
    - ssh -o StrictHostKeyChecking=no -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedAlgorithms=+ssh-rsa ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    - echo "Déploiement terminé avec succès !"
  only:
    - master
    - main