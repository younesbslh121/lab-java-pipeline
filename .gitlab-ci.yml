stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - echo "Phase de compilation..."
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - echo "Exécution des tests..."
    - mvn test
  dependencies:
    - job_build

job_deploy_simule:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "DÉMARRAGE DE LA SIMULATION..."
    - mvn package -DskipTests
    - echo "Connexion à l'instance $AWS_IP..."
    - sleep 2
    - mkdir -p ./env_production_aws/webapps/
    - cp target/*.jar ./env_production_aws/webapps/
    - ls -lh ./env_production_aws/webapps/
    - echo "DÉPLOIEMENT RÉUSSI SUR AWS"
  only:
    - master
    - main