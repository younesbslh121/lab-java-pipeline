stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  # On autorise la suite si les tests passent
  dependencies:
    - job_build

job_deploy_to_aws:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "Déploiement vers l'instance Ubuntu ($AWS_IP)..."
    # Utilisation des guillemets pour protéger le chemin de la variable File
    - chmod 400 "$AWS_PRIVATE_KEY"
    
    # Transfert avec l'utilisateur ubuntu
    - scp -o StrictHostKeyChecking=no -i "$AWS_PRIVATE_KEY" target/*.jar ubuntu@$AWS_IP:/tmp/
    
    # Installation sur le serveur (Vérifie si c'est .jar ou .war selon ton projet)
    - ssh -o StrictHostKeyChecking=no -i "$AWS_PRIVATE_KEY" ubuntu@$AWS_IP "sudo mv /tmp/*.jar /var/lib/tomcat9/webapps/"
    
    - echo "Déploiement terminé avec succès !"
  only:
    - master
    - main