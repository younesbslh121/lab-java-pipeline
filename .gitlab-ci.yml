stages:
  - build
  - test
  - deploy

job_build:
  stage: build
  tags:
    - pc-younes
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_test:
  stage: test
  tags:
    - pc-younes
  script:
    - mvn test
  dependencies:
    - job_build

job_deploy_simule:
  stage: deploy
  tags:
    - pc-younes
  script:
    - echo "DÉMARRAGE DE LA SIMULATION DE DÉPLOIEMENT..."
    - mvn package -DskipTests
    
    # Simulation de la connexion au Cloud
    - echo "Connexion à l'instance AWS $AWS_IP en cours..."
    - sleep 2 # Pour simuler le temps de latence réseau
    
    # Création d'un dossier qui simule le serveur distant sur ton ASUS TUF
    - mkdir -p ./serveur_virtuel_production/webapps/
    
    # Simulation du transfert du fichier (SCP)
    - cp target/*.jar ./serveur_virtuel_production/webapps/
    - echo "Transfert du package vers le serveur AWS (Simulation) terminé."
    
    # Vérification finale
    - ls -l ./serveur_virtuel_production/webapps/
    - echo "L'application est maintenant déployée et disponible sur http://$AWS_IP:8080/demo"
    - echo "ÉTAT DU DÉPLOIEMENT : SUCCÈS (SIMULÉ)"
  only:
    - master
    - main