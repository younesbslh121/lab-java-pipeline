stages:
  - build
  - test
  - docker

job_build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  tags:
    - pc-younes
  script:
    - echo "Phase de compilation..."
    - mvn clean compile
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

job_sonar_test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  tags:
    - pc-younes
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  dependencies:
    - job_build
  script:
    - echo "Exécution des tests et analyse SonarCloud..."

    - mvn verify sonar:sonar -Dsonar.projectKey=younesbslh121_lab-java-pipeline -Dsonar.qualitygate.wait=true
  allow_failure: false

job_docker:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  tags:
    - pc-younes
  before_script:

    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
  script:
    - echo "Construction et push de l'image Docker..."
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest

  only:
    - main
    - master
